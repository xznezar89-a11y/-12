<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محول الصور إلى كود (Base64)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #16213e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #e94560;
            margin-bottom: 20px;
        }
        p {
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .upload-area {
            border: 2px dashed #0f3460;
            padding: 40px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        .upload-area:hover {
            border-color: #e94560;
            background-color: rgba(233, 69, 96, 0.1);
        }
        #file-input {
            display: none;
        }
        .preview-img {
            max-width: 100%;
            max-height: 300px;
            margin-top: 20px;
            border-radius: 10px;
            display: none;
        }
        textarea {
            width: 100%;
            height: 150px;
            background-color: #0d1128;
            color: #a0a0a0;
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 10px;
            margin-top: 20px;
            resize: vertical;
            font-family: monospace;
            display: none;
        }
        .copy-btn {
            background-color: #e94560;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
            transition: background-color 0.3s ease;
            display: none;
        }
        .copy-btn:hover {
            background-color: #d1304d;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>محول الصور إلى كود</h1>
        <p>قم باختيار الصورة هنا لتحويلها إلى كود. بعد ذلك، انسخ الكود وأرسله لي وسأقوم بوضعه في الموقع مباشرة حتى لا تختفي الصورة أبداً.</p>
        
        <div class="upload-area" id="upload-area">
            انقر هنا لاختيار صورة
        </div>
        <input type="file" id="file-input" accept="image/*">
        
        <img id="preview" class="preview-img">
        
        <textarea id="base64-output" readonly placeholder="سيظهر الكود هنا..."></textarea>
        
        <button class="copy-btn" id="copy-btn">نسخ الكود</button>
    </div>

    <script>
        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');
        const preview = document.getElementById('preview');
        const base64Output = document.getElementById('base64-output');
        const copyBtn = document.getElementById('copy-btn');

        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    const base64String = e.target.result;
                    
                    // Show preview
                    preview.src = base64String;
                    preview.style.display = 'block';
                    
                    // Show textarea
                    base64Output.value = base64String;
                    base64Output.style.display = 'block';
                    
                    // Show copy button
                    copyBtn.style.display = 'inline-block';
                    copyBtn.textContent = 'نسخ الكود';
                };
                
                reader.readAsDataURL(file);
            }
        });

        copyBtn.addEventListener('click', () => {
            base64Output.select();
            document.execCommand('copy');
            copyBtn.textContent = 'تم النسخ! ✨';
            
            setTimeout(() => {
                copyBtn.textContent = 'نسخ الكود';
            }, 3000);
        });
    </script>
</body>
</html>
